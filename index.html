<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Socrate — Superadmin Portal for the Socrate OAuth2 / OpenID Connect platform" />
    <!--
      Content-Security-Policy + the hardening headers MUST be set as HTTP response
      headers on your reverse proxy — not via meta tags (weaker / unsupported).

      The CANONICAL policy lives in src/security/csp.ts (productionCsp() +
      SECURITY_HEADERS) and is unit-tested. Generate the proxy config from it and
      see docs/security-headers.md — including the Trusted Types Report-Only
      rollout (require-trusted-types-for 'script').
    -->
    <title>Socrate — Superadmin Portal</title>
    <!-- Fonts are self-hosted — no external CDN requests (F-12) -->
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
