<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OAuth2 Server Administration Portal" />
    <!--
      Content-Security-Policy and X-Frame-Options MUST be set via HTTP response
      headers on your reverse proxy / web server — not via meta tags.
      The meta http-equiv CSP is not supported by all browsers and is weaker
      than the header form.

      Recommended Nginx snippet (place in your server {} block):

        add_header Content-Security-Policy
          "default-src 'none';
           script-src 'self';
           style-src 'self' 'unsafe-inline';
           font-src 'self';
           connect-src 'self' https://your-admin-api-host;
           img-src 'self' data:;
           base-uri 'self';
           form-action 'self';
           frame-ancestors 'none';"
          always;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

      See docs/security-headers.md for full deployment guidance.
    -->
    <title>OAuth2 Superadmin Portal</title>
    <!-- Fonts are self-hosted — no external CDN requests (F-12) -->
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
